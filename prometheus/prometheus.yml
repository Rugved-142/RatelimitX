global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ratelimitx-monitor'

scrape_configs:
  # RateLimitX Application Metrics
  - job_name: 'ratelimitx'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
