version: '3.8'


services:
  #============================================================
  # POSTGRESQL DATABASE
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: ratelimitx-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimitx -d ratelimitx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ratelimitx-network
  # ============================================================
  # REDIS SERVICE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ratelimitx-redis
    ports: 
      - "6379:6379"
    volumes: 
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ratelimitx-network

  # ============================================================
  # RATELIMITX APPLICATION
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ratelimitx-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET:-myVeryLongAndSecureSecretKeyForJWTTokenGeneration123456789}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ratelimitx-network

  # ============================================================
  # PROMETHEUS MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ratelimitx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ratelimitx-network
    depends_on:
      - app

  # ============================================================
  # GRAFANA DASHBOARDS
  # ============================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: ratelimitx-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
      - TZ=UTC
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ratelimitx-network
    depends_on:
      - prometheus

# ============================================================
# VOLUMES (Persistent Storage)
# ============================================================
volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

# ============================================================
# NETWORKS
# ============================================================
networks:
  ratelimitx-network:
    driver: bridge